[window]
dimensions = { columns = 120, lines = 30 }
padding = { x = 10, y = 10 }
decorations = "full"
opacity = 0.95
startup_mode = "Windowed"

[scrolling]
history = 10000
multiplier = 3

[font]
normal = { style = "Regular" }
bold = { style = "Bold" }
italic = { style = "Italic" }
bold_italic = { style = "Bold Italic" }
size = 14.0

[colors]
primary = { background = "#1e1e1e", foreground = "#d4d4d4" }
cursor = { text = "#1e1e1e", cursor = "#d4d4d4" }

[colors.normal]
black = "#1e1e1e"
red = "#f44747"
green = "#4ec9b0"
yellow = "#ffcc02"
blue = "#3794ff"
magenta = "#bc3fbc"
cyan = "#1bc3fb"
white = "#cccccc"

[colors.bright]
black = "#666666"
red = "#f44747"
green = "#4ec9b0"
yellow = "#ffcc02"
blue = "#3794ff"
magenta = "#bc3fbc"
cyan = "#1bc3fb"
white = "#ffffff"

[keyboard]
bindings = [
  { key = "V", mods = "Command", action = "Paste" },
  { key = "C", mods = "Command", action = "Copy" },
  { key = "Q", mods = "Command", action = "Quit" },
  { key = "N", mods = "Command", action = "SpawnNewInstance" },
]

[mouse]
hide_when_typing = true

[[mouse.bindings]]
mouse = "Middle"
action = "PasteSelection"