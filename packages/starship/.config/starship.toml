format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$nodejs\
$python\
$rust\
$golang\
$java\
$php\
$cmd_duration\
$line_break\
$jobs\
$time\
$status\
$character"""

[fill]
symbol = " "

[directory]
style = "blue"
read_only = " 󰌾"
truncation_length = 4
truncate_to_repo = false

[character]
success_symbol = "[ 🦄 ❯](purple)"
error_symbol = "[ 🦄 ❯](red)"
vimcmd_symbol = "[ 🦄 ❮](green)"

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bright-green"

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "cyan"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[git_metrics]
disabled = false
added_style = "bold blue"
format = '[+$added]($added_style)/[-$deleted]($deleted_style) '

[cmd_duration]
format = "[$duration]($style) "
style = "yellow"

[time]
disabled = false
style = "bold white"
format = "[$time]($style)"

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"

[python]
symbol = " "
format = "[$symbol$pyenv_prefix($version )(\\($virtualenv\\) )]($style)"

[rust]
symbol = " "
format = "[$symbol($version )]($style)"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"

[java]
symbol = " "
format = "[$symbol($version )]($style)"

[php]
symbol = " "
format = "[$symbol($version )]($style)"

[jobs]
symbol = ""
style = "bold red"
number_threshold = 1
format = "[$symbol$number]($style) "

[status]
disabled = false
format = '[$symbol$status]($style) '
symbol = "✖"
style = "bold red"