command_timeout = 2000

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$cmd_duration\
$fill\
$jobs\
$nodejs\
$python\
$java\
$php\
$rust\
$golang\
$line_break\
$status\
$character"""

[fill]
symbol = " "

[username]
show_always = false
style_user = "bold yellow"
style_root = "bold red"
format = "[$user]($style) "

[hostname]
ssh_only = true
style = "bold yellow"
format = "[@$hostname]($style) "

[directory]
style = "bold blue"
read_only = " 󰌾"
truncation_length = 4
truncate_to_repo = false
before_repo_root_style = "blue"
repo_root_style = "bold blue"
truncation_symbol = "…/"

[character]
success_symbol = "[ 🦄 ❯](purple)"
error_symbol = "[ 🦄 ❯](red)"
vimcmd_symbol = "[ 🦄 ❮](green)"

[git_branch]
symbol = " "
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bright-green"

[git_status]
format = '([$all_status$ahead_behind]($style) )'
style = "cyan"
conflicted = "⚡$count "
ahead = "⇡$count "
behind = "⇣$count "
diverged = "⇕⇡$ahead_count⇣$behind_count "
untracked = "?$count "
stashed = "≡$count "
modified = "!$count "
staged = "+$count "
deleted = "✘$count "

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[cmd_duration]
min_time = 2000
format = "took [$duration]($style) "
style = "yellow"

[time]
disabled = true

[nodejs]
symbol = " "
format = "[$symbol($version )]($style)"
style = "green"

[python]
symbol = " "
format = "[$symbol$pyenv_prefix($version )(\\($virtualenv\\) )]($style)"
style = "yellow"

[java]
symbol = " "
format = "[$symbol($version )]($style)"
style = "red"

[php]
symbol = " "
format = "[$symbol($version )]($style)"
style = "purple"

[rust]
symbol = " "
format = "[$symbol($version )]($style)"
style = "orange"

[golang]
symbol = " "
format = "[$symbol($version )]($style)"
style = "cyan"

[jobs]
symbol = "⚙"
style = "bold red"
number_threshold = 1
format = "[$symbol$number]($style) "

[status]
disabled = false
format = '[$symbol$status ]($style)'
symbol = "✖ "
style = "bold red"
